name: clarity-validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clarity-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLARITY_NEOVIM_VERSION: v0.12.4
  CLARITY_PYTHON_VERSION: "3.12"
  CLARITY_NODE_VERSION: "22"

jobs:
  static:
    name: Static contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.CLARITY_PYTHON_VERSION }}

      - name: Install static tooling
        run: |
          python -m pip install --disable-pip-version-check ruff==0.15.21
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          curl --fail --location --retry 3 \
            --output /tmp/stylua.zip \
            https://github.com/JohnnyMorganz/StyLua/releases/download/v2.5.2/stylua-linux-x86_64.zip
          echo "bcb0d855e91f102f28a370e850f8566b3b44b79e6274d806ea5246837c0fd5ab  /tmp/stylua.zip" | sha256sum --check
          unzip -q /tmp/stylua.zip -d /tmp/stylua

      - name: Validate Python and workflow contracts
        run: |
          ruff check scripts tests/python
          python -m unittest discover -s tests/python -v
          "$(go env GOPATH)/bin/actionlint" .github/workflows/clarity-validate.yml

      - name: Validate Lua and repository contracts
        run: |
          /tmp/stylua/stylua --check init.lua nvim tests/lua
          python - <<'PY'
          import json
          from pathlib import Path

          for path in (Path("lazy-lock.json"), Path("lazyvim.json")):
              json.loads(path.read_text(encoding="utf-8"))
          assert not Path("nvim/lazy-lock.json").exists()
          assert not Path("nvim/lazyvim.json").exists()
          PY
          git diff --check

  validate:
    name: Runtime (${{ matrix.os }})
    needs: static
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-14
    env:
      CLARITY_NONINTERACTIVE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.CLARITY_PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.CLARITY_NODE_VERSION }}
          package-manager-cache: false

      - name: Configure isolated runtime directories
        run: python scripts/configure_ci_runtime.py

      - name: Install official checksummed Neovim
        run: >-
          python scripts/install_neovim.py
          --version "${{ env.CLARITY_NEOVIM_VERSION }}"
          --destination "${{ runner.temp }}/clarity-tools/neovim"
          --github-env

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ripgrep fd-find

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ripgrep fd

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install zig ripgrep fd -y --no-progress

      - name: Install pinned provider packages
        run: |
          python -m pip install --disable-pip-version-check pynvim==0.6.0
          npm install -g neovim@5.4.0 tree-sitter-cli@0.26.10

      - name: Prepare artifacts directory
        run: python -c "from pathlib import Path; Path('artifacts').mkdir(exist_ok=True)"

      - name: Run isolated first boot and restart
        run: >-
          python scripts/run_clarity_smoke.py
          --timeout 300
          > artifacts/smoke.json

      - name: Run audit
        run: >-
          python scripts/run_clarity_audit.py
          --json
          --timeout 120
          > artifacts/audit.json

      - name: Run runtime validation
        run: python scripts/run_clarity_validate.py --json > artifacts/validation.json

      - name: Run Lua policy tests
        run: python scripts/run_clarity_lua_tests.py > artifacts/lua-tests.txt

      - name: Verify repository authority files are unchanged
        run: git diff --exit-code -- lazy-lock.json lazyvim.json

      - name: Record environment manifest
        run: |
          python -c "import json, os, platform; from pathlib import Path; Path('artifacts/environment.json').write_text(json.dumps({'os': platform.platform(), 'python': platform.python_version(), 'nvim': os.environ.get('NVIM_BIN'), 'neovim_version': os.environ.get('CLARITY_NEOVIM_VERSION'), 'node_version': os.environ.get('CLARITY_NODE_VERSION')}, indent=2), encoding='utf-8')"

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: clarity-${{ matrix.os }}-${{ github.sha }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
